<ion-content [fullscreen]="true" class="chat-content">
  <div class="chat-shell">
    <header class="chat-header">
      <button class="back-btn" (click)="back()" aria-label="Volver">
        <ion-icon name="chevron-back"></ion-icon>
      </button>
      <div class="ch-title">
        <div class="ch-name">{{ withName() }}</div>
        <div class="ch-sub">Acordar intercambio</div>
      </div>
    </header>

    <div class="chat-scroll">
      @if (loading()) {
        <div class="centered"><ion-spinner name="dots"></ion-spinner></div>
      } @else if (messages().length === 0) {
        <div class="chat-empty">
          <p>Aún no hay mensajes.</p>
          <p class="hint">Escribí para coordinar dónde y cuándo se ven.</p>
        </div>
      } @else {
        @for (m of messages(); track m.id) {
          <div class="bubble-row" [class.mine]="isMine(m)">
            <div class="bubble">
              <div class="b-body">{{ m.body }}</div>
              <div class="b-time">{{ time(m.createdAt) }}</div>
            </div>
          </div>
        }
      }
    </div>

    <div class="chat-input">
      <textarea
        rows="1"
        maxlength="500"
        placeholder="Escribe un mensaje…"
        [value]="draft()"
        (input)="onInput($event)"
      ></textarea>
      <button class="send-btn" (click)="send()" [disabled]="!draft().trim() || sending()" aria-label="Enviar">
        <ion-icon name="send"></ion-icon>
      </button>
    </div>
  </div>
</ion-content>
