<ion-content [fullscreen]="true" class="login-content">
  <!-- Stadium hero -->
  <div class="stadium-hero">
    <div class="halftone"></div>
    <div class="hash-stripes hash-corner-tr"></div>

    <svg class="mundial-mark" width="66" height="66" viewBox="0 0 100 100" fill="none" aria-hidden="true">
      <defs>
        <clipPath id="fmclip-login"><rect x="6" y="6" width="88" height="88" rx="22"/></clipPath>
      </defs>
      <rect x="6" y="6" width="88" height="88" rx="22" fill="#FFFCF4"/>
      <g clip-path="url(#fmclip-login)">
        <g transform="rotate(40 78 20)"><rect x="52" y="12" width="76" height="11" fill="#D4AF37"/></g>
      </g>
      <g transform="translate(22 30) scale(0.27)" fill="#E30613">
        <rect x="0" y="0" width="22" height="120"/>
        <rect x="0" y="0" width="60" height="20"/>
        <rect x="0" y="50" width="46" height="18"/>
        <rect x="85" y="0" width="22" height="120"/>
        <rect x="183" y="0" width="22" height="120"/>
        <path d="M96 2 L145 74 L194 2" fill="none" stroke="#E30613" stroke-width="22" stroke-linejoin="round"/>
      </g>
      <rect x="33" y="76" width="34" height="4" rx="2" fill="#D4AF37"/>
    </svg>

    <div class="brand">
      <div>Figuritas</div>
      <div class="gold">del&nbsp;Mundial</div>
    </div>

    <div class="tagline">USA · CANADÁ · MÉXICO · 2026</div>
  </div>

  <!-- Form -->
  <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
    <h2 class="display-title">Iniciar sesión</h2>
    <p class="muted">Tu álbum del Mundial. En el bolsillo.</p>

    <div class="field">
      <label>Usuario o email</label>
      <input
        type="text"
        autocomplete="username"
        formControlName="usernameOrEmail"
        placeholder="tu_usuario o tu@email.com"
      />
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input
        type="password"
        autocomplete="current-password"
        formControlName="password"
        placeholder="••••••"
      />
    </div>

    @if (errorMessage()) {
      <div class="error">{{ errorMessage() }}</div>
    }

    <button type="submit" class="primary-btn" [disabled]="form.invalid || loading()">
      @if (loading()) {
        <ion-spinner name="dots"></ion-spinner>
      } @else {
        Entrar
        <ion-icon name="arrow-forward"></ion-icon>
      }
    </button>

    <div class="link-row">
      ¿No tienes cuenta? <a routerLink="/register">Regístrate</a>
    </div>

    <div class="perks">
      <div class="perk">
        <div class="perk-icon">
          <ion-icon name="albums-outline"></ion-icon>
        </div>
        <div class="perk-label">Pega tus cromos</div>
      </div>
      <div class="perk">
        <div class="perk-icon">
          <ion-icon name="swap-horizontal-outline"></ion-icon>
        </div>
        <div class="perk-label">Intercambia con amigos</div>
      </div>
      <div class="perk">
        <div class="perk-icon">
          <ion-icon name="trending-up-outline"></ion-icon>
        </div>
        <div class="perk-label">Sigue tu progreso</div>
      </div>
    </div>
  </form>
</ion-content>
