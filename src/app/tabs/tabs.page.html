<ion-tabs>
  <ion-tab-bar slot="bottom" class="mundial-tabbar">
    <ion-tab-button tab="tab1" href="/tabs/tab1">
      <ion-icon aria-hidden="true" name="home"></ion-icon>
      <ion-label>Inicio</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab2" href="/tabs/tab2">
      <ion-icon aria-hidden="true" name="albums"></ion-icon>
      <ion-label>Álbum</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab3" href="/tabs/tab3">
      <ion-icon aria-hidden="true" name="stats-chart"></ion-icon>
      <ion-label>Stats</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="friends" href="/tabs/friends">
      <ion-icon aria-hidden="true" name="people"></ion-icon>
      <ion-label>Amigos</ion-label>
      @if (pending() > 0) {
        <ion-badge color="primary">{{ pending() }}</ion-badge>
      }
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
