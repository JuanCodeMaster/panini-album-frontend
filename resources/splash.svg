<svg xmlns="http://www.w3.org/2000/svg" width="2732" height="2732" viewBox="0 0 2732 2732">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12060A"/>
      <stop offset="100%" stop-color="#0A0306"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#E30613"/>
      <stop offset="100%" stop-color="#9b0510"/>
    </linearGradient>
    <pattern id="dots" width="56" height="56" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="5" fill="rgba(255,255,255,0.16)"/>
    </pattern>
    <linearGradient id="dotsfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="dotsmask">
      <rect x="1056" y="956" width="620" height="820" fill="url(#dotsfade)"/>
    </mask>
  </defs>

  <rect x="0" y="0" width="2732" height="2732" fill="url(#sky)"/>

  <!-- Figurita FM centrada -->
  <g>
    <rect x="1056" y="956" width="620" height="820" rx="64" fill="url(#card)"/>
    <rect x="1056" y="956" width="620" height="820" rx="64" fill="url(#dots)" mask="url(#dotsmask)"/>
    <!-- borde troquelado punteado -->
    <rect x="1086" y="986" width="560" height="760" rx="44" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-dasharray="10 8"/>
    <!-- cinta dorada -->
    <g transform="rotate(40 1560 1080)">
      <rect x="1430" y="1052" width="430" height="54" fill="#D4AF37"/>
    </g>
    <!-- FM -->
    <g transform="translate(1230 1140) scale(1.30)" fill="#FFFFFF">
      <rect x="0" y="0" width="22" height="120"/>
      <rect x="0" y="0" width="60" height="20"/>
      <rect x="0" y="50" width="46" height="18"/>
      <rect x="85" y="0" width="22" height="120"/>
      <rect x="183" y="0" width="22" height="120"/>
      <path d="M96 2 L145 74 L194 2" fill="none" stroke="#FFFFFF" stroke-width="22" stroke-linejoin="round"/>
    </g>
    <rect x="1286" y="1480" width="280" height="8" rx="4" fill="#D4AF37"/>
    <g text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" fill="#FFFFFF">
      <text x="1366" y="1600" font-size="52" letter-spacing="8">FIGURITAS</text>
      <text x="1366" y="1672" font-size="40" letter-spacing="12" fill="#D4AF37">· DEL MUNDIAL ·</text>
    </g>
  </g>

  <!-- Wordmark inferior -->
  <g text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900">
    <text x="1366" y="1990" font-size="58" letter-spacing="16" fill="rgba(255,255,255,0.55)">USA · CANADÁ · MÉXICO · 2026</text>
  </g>
</svg>
