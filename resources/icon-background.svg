<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.32" y2="1">
      <stop offset="0%" stop-color="#E30613"/>
      <stop offset="100%" stop-color="#9b0510"/>
    </linearGradient>
    <pattern id="dots" width="56" height="56" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="5.5" fill="rgba(255,255,255,0.14)"/>
    </pattern>
    <linearGradient id="dotsfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="dotsmask">
      <rect x="0" y="0" width="1024" height="1024" fill="url(#dotsfade)"/>
    </mask>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#dots)" mask="url(#dotsmask)"/>
</svg>
