<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.32" y2="1">
      <stop offset="0%" stop-color="#E30613"/>
      <stop offset="100%" stop-color="#9b0510"/>
    </linearGradient>
    <pattern id="dots" width="56" height="56" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="5.5" fill="rgba(255,255,255,0.16)"/>
    </pattern>
    <linearGradient id="dotsfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="dotsmask">
      <rect x="0" y="0" width="1024" height="1024" fill="url(#dotsfade)"/>
    </mask>
  </defs>

  <!-- Fondo full-bleed (iOS aplica su propia máscara redondeada) -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>

  <!-- Halftone dots desvaneciendo desde arriba -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#dots)" mask="url(#dotsmask)"/>

  <!-- Cinta dorada diagonal (esquina superior derecha) -->
  <g transform="rotate(40 780 150)">
    <rect x="560" y="116" width="720" height="92" fill="#D4AF37"/>
    <rect x="560" y="124" width="720" height="2.5" fill="rgba(58,42,5,0.45)"/>
    <rect x="560" y="197.5" width="720" height="2.5" fill="rgba(58,42,5,0.45)"/>
  </g>

  <!-- Monograma "FM" (vector, font-independent) -->
  <!-- caja nativa 205x120, escalada y centrada -->
  <g transform="translate(232 322) scale(2.73)" fill="#FFFFFF">
    <!-- F -->
    <rect x="0" y="0" width="22" height="120"/>
    <rect x="0" y="0" width="60" height="20"/>
    <rect x="0" y="50" width="46" height="18"/>
    <!-- M: dos barras verticales -->
    <rect x="85" y="0" width="22" height="120"/>
    <rect x="183" y="0" width="22" height="120"/>
    <!-- M: V central -->
    <path d="M96 2 L145 74 L194 2" fill="none" stroke="#FFFFFF" stroke-width="22" stroke-linejoin="round"/>
  </g>

  <!-- Regla dorada bajo el monograma -->
  <rect x="312" y="690" width="400" height="9" rx="4" fill="#D4AF37"/>

  <!-- Footer -->
  <g text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" fill="#FFFFFF">
    <text x="512" y="800" font-size="62" letter-spacing="10">FIGURITAS</text>
    <text x="512" y="876" font-size="48" letter-spacing="14" fill="#D4AF37">· 26 ·</text>
  </g>
</svg>
